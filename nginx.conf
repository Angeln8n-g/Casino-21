server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Proxy WebSocket and HTTP requests to socket.io backend
    location /socket.io/ {
        proxy_pass http://backend:4000/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # Proxy health check to the backend
    location = /health {
        proxy_pass http://backend:4000/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy rules version check to the backend
    location = /rules_version {
        proxy_pass http://backend:4000/rules_version;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Custom caching rules for static assets
    location /assets/ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # SEO Static HTML pages generated at build time
    location = /privacy    { try_files /privacy.html =404; }
    location = /terms      { try_files /terms.html =404; }
    location = /cookies    { try_files /cookies.html =404; }
    location = /como-jugar { try_files /como-jugar.html =404; }
    location = /about      { try_files /about.html =404; }
    location = /contact    { try_files /contact.html =404; }
    location = /faq        { try_files /faq.html =404; }
    location = /blog       { try_files /blog.html =404; }
    
    # Blog post routes
    location ~ ^/blog/(.+\.html)$ { try_files /blog/$1 =404; }
    location ~ ^/blog/([^/]+)$ { try_files /blog/$1.html /index.html; }
    
    location = /login      { try_files /login.html =404; }

    # SPA Router fallback for React Router
    location / {
        try_files $uri $uri/ /index.html;
    }

      # Resolver de DNS interno de Docker + DNS público para resolución de dominios sslip.io
      resolver 127.0.0.11 8.8.8.8 valid=30s;

      location /auth/ {
          set $supabase_auth http://supabase-kong-fx0i0zfg2d56g4di15lu499b:8000;
          proxy_pass $supabase_auth/auth/;
         proxy_http_version 1.1;
         proxy_set_header Host $host;
         proxy_set_header X-Real-IP $remote_addr;
         proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
         proxy_set_header X-Forwarded-Proto $scheme;
     }
         location /rest/ {
          set $supabase_rest http://supabase-kong-fx0i0zfg2d56g4di15lu499b:8000;
          proxy_pass $supabase_rest/rest/;
         proxy_http_version 1.1;
         proxy_set_header Host $host;
         proxy_set_header X-Real-IP $remote_addr;
         proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
         proxy_set_header X-Forwarded-Proto $scheme;
     }
         location /storage/ {
          set $supabase_storage http://supabase-kong-fx0i0zfg2d56g4di15lu499b:8000;
          proxy_pass $supabase_storage/storage/;
         proxy_http_version 1.1;
         proxy_set_header Host $host;
         proxy_set_header X-Real-IP $remote_addr;
         proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
         proxy_set_header X-Forwarded-Proto $scheme;
         proxy_read_timeout 60s;
         client_max_body_size 50M;
     }
         location /realtime/ {
          set $supabase_realtime http://supabase-kong-fx0i0zfg2d56g4di15lu499b:8000;
          proxy_pass $supabase_realtime/realtime/;
         proxy_http_version 1.1;
         proxy_set_header Upgrade $http_upgrade;
         proxy_set_header Connection "upgrade";
         proxy_set_header Host $host;
         proxy_set_header X-Real-IP $remote_addr;
         proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
         proxy_set_header X-Forwarded-Proto $scheme;
     }
}
