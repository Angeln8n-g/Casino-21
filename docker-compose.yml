services:
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: casino21_backend
    environment:
      - NODE_ENV=production
      - PORT=4000
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - CORS_ORIGINS=${CORS_ORIGINS}
      - ALLOW_INSECURE_JWT_FALLBACK=${ALLOW_INSECURE_JWT_FALLBACK:-false}
      - EXPOSE_RULES_VERSION=${EXPOSE_RULES_VERSION:-false}
      - REDIS_URL=${REDIS_URL}
      - USE_REDIS_ADAPTER=${USE_REDIS_ADAPTER:-false}
      - VAPID_PUBLIC_KEY=${VAPID_PUBLIC_KEY}
      - VAPID_PRIVATE_KEY=${VAPID_PRIVATE_KEY}
      - VAPID_SUBJECT=${VAPID_SUBJECT}
    restart: always
    expose:
      - "4000"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - VITE_SUPABASE_URL=${VITE_SUPABASE_URL}
        - VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY}
        - VITE_SOCKET_URL=${VITE_SOCKET_URL}
        - VITE_SHOW_RULES_VERSION=${VITE_SHOW_RULES_VERSION:-false}
        - VITE_VAPID_PUBLIC_KEY=${VITE_VAPID_PUBLIC_KEY}
    container_name: casino21_frontend
    restart: always
    expose:
      - "80"
    depends_on:
      - backend



